name: expense_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  intl: ^0.20.2
  google_fonts: ^8.0.2
  google_sign_in: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_exspan_launcher.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_exspan_launcher.png"
  windows:
    generate: true
    image_path: "assets/images/logo_exspan_launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
